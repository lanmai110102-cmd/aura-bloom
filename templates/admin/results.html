{% extends "base.html" %}
{% block title %}Results · Admin{% endblock %}
{% block content %}
<div class="admin-wrap">
  <div class="admin-nav">
    <a href="/admin">Dashboard</a>
    <a href="/admin/case-studies">Case Studies</a>
    <a href="/admin/projects">Other Projects</a>
    <a href="/admin/team">Team</a>
    <a href="/admin/results">Results</a>
    <a href="/admin/leads">Leads</a>
  </div>
  <div class="admin-card">
    <h2 style="color:var(--cafe-noir);">Thêm chỉ số</h2>
    <form class="admin-form" method="POST">
      <label>Chỉ số (metric)</label><input type="text" name="metric" required>
      <label>Kết quả (result)</label><input type="text" name="result" required>
      <label>Dự án</label><input type="text" name="project" required>
      <label>Thứ tự</label><input type="number" name="order" value="0">
      <button class="btn primary" type="submit" style="margin-top:18px;">Thêm</button>
    </form>
  </div>
  <div class="admin-card">
    <h2 style="color:var(--cafe-noir);">Danh sách</h2>
    <table class="admin-table">
      <tr><th>Metric</th><th>Result</th><th>Project</th><th></th></tr>
      {% for r in items %}
      <tr>
        <td>{{ r.metric }}</td><td>{{ r.result }}</td><td>{{ r.project }}</td>
        <td>
          <form action="/admin/results/{{ r.id }}/delete" method="POST" onsubmit="return confirm('Xoá?');">
            <button type="submit" style="border:none;background:none;color:#b85c4a;cursor:pointer;">Xoá</button>
          </form>
        </td>
      </tr>
      {% endfor %}
    </table>
  </div>
</div>
{% endblock %}

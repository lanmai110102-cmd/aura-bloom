{% extends "base.html" %}
{% block title %}Other Projects · Admin{% endblock %}
{% block content %}
<div class="admin-wrap">
  <div class="admin-nav">
    <a href="/admin">Dashboard</a>
    <a href="/admin/case-studies">Case Studies</a>
    <a href="/admin/projects">Other Projects</a>
    <a href="/admin/team">Team</a>
    <a href="/admin/results">Results</a>
    <a href="/admin/leads">Leads</a>
  </div>
  <div class="admin-card">
    <h2 style="color:var(--cafe-noir);">Thêm dự án mới</h2>
    <form class="admin-form" method="POST">
      <label>Tên dự án</label>
      <input type="text" name="name" required>
      <label>Mô tả</label>
      <textarea name="description" rows="2" required></textarea>
      <label>Thứ tự</label>
      <input type="number" name="order" value="0">
      <button class="btn primary" type="submit" style="margin-top:18px;">Thêm</button>
    </form>
  </div>
  <div class="admin-card">
    <h2 style="color:var(--cafe-noir);">Danh sách</h2>
    <table class="admin-table">
      <tr><th>Tên</th><th>Mô tả</th><th></th></tr>
      {% for p in items %}
      <tr>
        <td>{{ p.name }}</td>
        <td style="max-width:420px;">{{ p.description }}</td>
        <td>
          <form action="/admin/projects/{{ p.id }}/delete" method="POST" onsubmit="return confirm('Xoá?');">
            <button type="submit" style="border:none;background:none;color:#b85c4a;cursor:pointer;">Xoá</button>
          </form>
        </td>
      </tr>
      {% endfor %}
    </table>
  </div>
</div>
{% endblock %}
